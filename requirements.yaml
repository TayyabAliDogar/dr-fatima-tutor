packages:
  "framer-motion": "For premium scroll-triggered animations and fluid micro-interactions"
  "react-hook-form": "For robust contact form state management"
  "@hookform/resolvers": "For Zod schema validation integration"
  "zod": "For strict form input validation"

images:
  - path: "artifacts/dr-fatima/public/images/dr-fatima-avatar.png"
    description: "A highly professional portrait of a female doctor in a crisp white medical coat, smiling confidently and warmly. Clean, bright, and modern studio lighting."
    aspect_ratio: "3:4"
  - path: "artifacts/dr-fatima/public/images/science-abstract.png"
    description: "Abstract geometric pattern featuring soft glowing connections, subtle DNA helix motifs, and molecular structures in deep navy blue and emerald teal gradients. High-tech, premium, clean."
    aspect_ratio: "16:9"

notes:
  - Application is a single-page portfolio; all navigation relies on smooth scrolling to element IDs.
  - Form submission is mocked via TanStack Query to simulate real-world UX with loading states and toast notifications.
