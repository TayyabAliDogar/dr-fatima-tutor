kind = "web"
previewPath = "/"
title = "Dr. Fatima Zahra - Medical Tutor"
version = "1.0.0"
id = "artifacts/dr-fatima"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25368

[services.development]
run = "pnpm --filter @workspace/dr-fatima run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dr-fatima", "run", "build" ]
publicDir = "artifacts/dr-fatima/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25368"
BASE_PATH = "/"
